  <rect x="125" y="145" width="70" height="70" rx="12" fill="rgba(201,168,76,0.08)" stroke="rgba(201,168,76,0.35)" stroke-width="1.5"/>
  <text x="160" y="193" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="900" fill="url(#gold)">VL</text>
