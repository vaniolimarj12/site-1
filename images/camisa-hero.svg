  <!-- Body -->
  <path d="M80 90 L30 130 L55 155 L80 135 L80 300 L240 300 L240 135 L265 155 L290 130 L240 90 Q220 75 200 80 Q180 95 160 95 Q140 95 120 80 Q100 75 80 90Z" fill="url(#hg)" filter="url(#sh)" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
  <!-- Collar -->
  <path d="M120 80 Q140 105 160 105 Q180 105 200 80" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
