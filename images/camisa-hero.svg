    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C040"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#C9A84C" flood-opacity="0.45"/>
